# Read the Docs configuration file for Sphinx projects
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Drive the build with uv so the project's [dependency-groups] (PEP 735)
# are honored. `uv sync` installs the project itself in addition to the
# selected group, which conf.py needs in order to do
# `from esc.consts import VERSION`. With `build.commands` set, RTD skips
# its default install/build pipeline; the `sphinx:` and `python:` keys
# are not used.
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - python -m pip install --upgrade uv
    - uv sync --frozen --group docs
    - uv run sphinx-build -b html docs $READTHEDOCS_OUTPUT/html
